version: "3.9"

# =============================================================================
# Docker Compose — Infraestrutura de desenvolvimento local
# =============================================================================
# Uso: docker compose up -d
# Para parar: docker compose down
# Para reset total: docker compose down -v

services:
  # ─── PostgreSQL com PostGIS ─────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: servicos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: servicos_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d servicos_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: servicos_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── MinIO (S3-compatible local storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: servicos_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── PgAdmin (UI para o PostgreSQL) ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: servicos_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    profiles:
      - tools

  # ─── Redis Commander (UI para o Redis) ───────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: servicos_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    profiles:
      - tools

  # ─── Mailhog (email local) ───────────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: servicos_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:
  minio_data:
  pgadmin_data:

networks:
  default:
    name: servicos_network
