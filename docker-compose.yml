version: '3.9'

# SERVIX — Docker Compose para desenvolvimento local
# Inclui: PostgreSQL, Redis, MinIO (S3), MailHog

services:
  # ============================================================
  # PostgreSQL — Banco de dados principal
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: servix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-servix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-servix123}
      POSTGRES_DB: ${POSTGRES_DB:-servix_dev}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-servix} -d ${POSTGRES_DB:-servix_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - servix-network

  # ============================================================
  # Redis — Cache e filas BullMQ
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: servix-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - servix-network

  # ============================================================
  # MinIO — S3 compatível para storage local
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: servix-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-servix}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-servix12345}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - servix-network

  # ============================================================
  # MailHog — Servidor de e-mail para desenvolvimento
  # ============================================================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: servix-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"   # SMTP
      - "${MAILHOG_UI_PORT:-8025}:8025"     # Web UI
    networks:
      - servix-network

  # ============================================================
  # Redis Commander — UI para Redis (opcional)
  # ============================================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: servix-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:redis:6379:0:${REDIS_PASSWORD:-redis123}"
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - servix-network
    profiles:
      - tools

  # ============================================================
  # Backend API
  # ============================================================
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      target: development
    container_name: servix-backend
    restart: unless-stopped
    env_file:
      - ./apps/backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-servix}:${POSTGRES_PASSWORD:-servix123}@postgres:5432/${POSTGRES_DB:-servix_dev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      NODE_ENV: development
    volumes:
      - ./apps/backend/src:/app/src
      - ./apps/backend/prisma:/app/prisma
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - servix-network
    profiles:
      - full

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  servix-network:
    driver: bridge
    name: servix-network
