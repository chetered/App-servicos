# Railway monorepo configuration
[build]
builder = "NIXPACKS"
buildCommand = "pnpm install && pnpm --filter @servicos/database exec prisma generate && pnpm --filter @servicos/api run build"

[deploy]
startCommand = "node apps/api/dist/apps/api/src/main.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
