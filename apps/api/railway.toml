# Railway deployment configuration for the NestJS API
[build]
builder = "NIXPACKS"
buildCommand = "cd ../.. && pnpm install && pnpm --filter @servicos/database exec prisma generate && pnpm --filter @servicos/api run build"

[deploy]
startCommand = "node /app/apps/api/dist/apps/api/src/main.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "api"
